<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI Package · .aip</title>
  <style>
    :root{color-scheme:dark;--ink:#f4f2ec;--muted:#99958c;--line:#34322e;--lime:#c9ff67;--panel:#211f1c;--danger:#ff8b78}
    *{box-sizing:border-box}html,body{height:100%;overflow:hidden}
    body{margin:0;font-family:Inter,ui-sans-serif,system-ui,sans-serif;color:var(--ink);background:radial-gradient(circle at 75% 0,#303a20 0,transparent 30%),#11110f}
    main{width:min(980px,calc(100% - 28px));height:100dvh;margin:auto;padding:16px 0;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:10px}
    header{display:flex;align-items:end;justify-content:space-between;gap:20px}h1{margin:3px 0 0;font-size:clamp(32px,5.2vh,52px);line-height:.9;letter-spacing:-.055em}
    .eyebrow{color:var(--lime);font-size:10px;letter-spacing:.18em;text-transform:uppercase}.headerTools{display:flex;align-items:center;gap:12px}.version{color:var(--muted);font:11px ui-monospace,monospace}
    .language{display:flex;padding:2px;border:1px solid var(--line);border-radius:8px;background:#171614}.language button{border:0;border-radius:6px;padding:5px 8px;background:transparent;color:var(--muted);font:10px ui-monospace,monospace;cursor:pointer}.language button.active{color:#111;background:var(--lime)}
    .panel{min-height:0;background:color-mix(in srgb,var(--panel) 92%,transparent);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 24px 60px #0008;display:grid;grid-template-rows:auto minmax(0,1fr)}
    .tabs{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--line)}.tab{appearance:none;border:0;background:transparent;color:var(--muted);padding:12px;font-weight:700;cursor:pointer}.tab.active{color:var(--ink);background:#ffffff08;box-shadow:inset 0 -2px var(--lime)}
    .content{min-height:0;padding:14px 18px;display:grid;grid-template-columns:minmax(0,1.18fr) minmax(300px,.82fr);gap:14px}.left,.right{min-height:0;display:flex;flex-direction:column}
    .drop{min-height:150px;flex:1;border:1px dashed #4a4842;border-radius:14px;background:#12121080;cursor:pointer;transition:.18s;display:flex;flex-direction:column;overflow:hidden}.drop:hover,.drop.drag{border-color:var(--lime);background:#c9ff6708}
    .dropIntro{flex:1;min-height:88px;display:grid;place-items:center;text-align:center;padding:12px}.drop input,.compareDrop input{display:none}.orb{width:38px;height:38px;display:grid;place-items:center;margin:auto auto 7px;border-radius:50%;color:#111;background:var(--lime);font-size:19px}.drop strong{font-size:14px}.drop p{color:var(--muted);margin:4px 0 0;font-size:10px}
    .uploadList{display:none;max-height:104px;overflow:auto;border-top:1px solid var(--line);padding:6px 8px;scrollbar-width:thin;scrollbar-color:#4a4842 transparent}.uploadList.show{display:block}.uploadItem{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;padding:5px 6px;border-radius:6px;text-align:left;font-size:10px}.uploadItem:nth-child(odd){background:#ffffff05}.uploadItem span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.uploadItem small{color:var(--muted)}
    .settings{display:grid;gap:8px;max-height:100%;padding:12px;border:1px solid var(--line);border-radius:12px;background:#171614;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#4a4842 transparent}
    label.field{color:var(--muted);font-size:10px}input[type=text],select{width:100%;margin-top:4px;padding:7px 8px;color:var(--ink);background:#11110f;border:1px solid var(--line);border-radius:8px;outline:none;font:11px ui-monospace,monospace}input:focus,select:focus{border-color:var(--lime)}
    .modelRow,.methodRow{display:grid;grid-template-columns:1fr auto;gap:6px;align-items:end}.methodRow{grid-template-columns:90px 1fr}.refresh{height:32px;padding:0 10px;border:1px solid var(--line);border-radius:8px;background:#24221e;color:var(--ink);cursor:pointer}.modeHelp{margin:-1px 0;color:var(--muted);font-size:10px;line-height:1.3}.configPanel{display:none;gap:7px}.configPanel.show{display:grid}.templateNote{color:var(--lime);font-size:9px}
    .codeEditor{position:relative;margin-top:4px;min-height:110px}.codeEditor.body{min-height:170px}.codeEditor pre,.codeEditor textarea{position:absolute;inset:0;width:100%;height:100%;margin:0;padding:8px;overflow:auto;white-space:pre-wrap;overflow-wrap:anywhere;border:1px solid var(--line);border-radius:8px;font:11px/1.45 ui-monospace,monospace;tab-size:2}.codeEditor pre{pointer-events:none;background:#11110f;color:var(--ink)}.codeEditor pre .token{color:#111;background:var(--lime);border-radius:3px;padding:0 1px;font-weight:800}.codeEditor textarea{resize:none;background:transparent;color:transparent;-webkit-text-fill-color:transparent;caret-color:var(--ink);outline:none}.codeEditor textarea:focus{border-color:var(--lime)}.codeEditor.invalid pre,.codeEditor.invalid textarea{border-color:var(--danger)}
    .compareSettings{display:none;gap:9px;padding:12px;border:1px solid var(--line);border-radius:12px;background:#171614}.compareSettings.show{display:grid}.check{display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer}.compareDrop{display:none;padding:13px;border:1px dashed #4a4842;border-radius:10px;text-align:center;color:var(--muted);font-size:11px;cursor:pointer}.compareDrop.show{display:block}.compareDrop.drag{border-color:var(--lime);background:#c9ff6708}.compareDrop strong{display:block;color:var(--ink);margin-bottom:3px}
    .actions{display:grid;grid-template-columns:auto minmax(0,1fr);align-items:center;gap:11px;margin-top:10px}.actionInfo{min-width:0;display:grid;gap:6px}.go{border:0;border-radius:10px;padding:12px 18px;background:var(--lime);color:#10120c;font-weight:800;cursor:pointer;white-space:nowrap}.go:disabled{opacity:.3;cursor:not-allowed}.status{color:var(--muted);font-size:11px;line-height:1.35}.status.busy{color:var(--lime)}
    .progress{display:none;width:100%;height:7px;border-radius:99px;background:#11110f;overflow:hidden}.progress.show{display:block}.progressBar{height:100%;width:0;background:var(--lime);transition:width .25s ease}.progress.indeterminate .progressBar{width:35%;animation:slide 1.2s infinite ease-in-out}@keyframes slide{from{transform:translateX(-110%)}to{transform:translateX(310%)}}
    .result{display:none;margin-top:9px;grid-template-columns:repeat(3,1fr);gap:1px;overflow:hidden;border:1px solid var(--line);border-radius:10px;background:var(--line)}.result.show{display:grid}.metric{background:#181714;padding:9px}.metric span{display:block;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.1em}.metric b{display:block;margin-top:3px;font-size:14px}
    .compareResult{display:none;margin-top:8px;padding:9px;border-radius:9px;font-size:11px;font-weight:700}.compareResult.show{display:block}.compareResult.match{color:var(--lime);background:#c9ff6710;border:1px solid #c9ff6744}.compareResult.mismatch{color:var(--danger);background:#ff665510;border:1px solid #ff665544}
    footer{color:#716e67;font-size:10px;text-align:center}@media(max-width:720px){html,body{overflow:auto}main{height:auto;min-height:100dvh}.content{grid-template-columns:1fr}.headerTools{align-items:end;flex-direction:column}.drop{min-height:190px}}@media(max-height:650px) and (min-width:721px){main{padding:8px 0}h1{font-size:30px}.eyebrow{display:none}.content{padding:9px 13px}.drop{min-height:120px}.settings{padding:9px}}
  </style>
</head>
<body>
<main>
  <header>
    <div><div class="eyebrow">local-first compression</div><h1>AI Package</h1></div>
    <div class="headerTools"><div class="language"><button id="langKo" class="active">한글</button><button id="langEn">EN</button></div><div class="version">FORMAT / API1<br>LOSSLESS / SHA-256</div></div>
  </header>
  <section class="panel">
    <div class="tabs"><button class="tab active" data-mode="compress" data-i18n="compressTab">압축하기</button><button class="tab" data-mode="decompress" data-i18n="decompressTab">압축풀기</button></div>
    <div class="content">
      <div class="left">
        <div class="drop" id="drop">
          <input id="picker" type="file" multiple>
          <div class="dropIntro"><div><div class="orb">↓</div><strong id="prompt"></strong><p id="hint"></p></div></div>
          <div class="uploadList" id="uploadList"></div>
        </div>
        <div class="actions">
          <button class="go" id="go" disabled></button>
          <div class="actionInfo"><div class="status" id="status"></div><div class="progress" id="progress"><div class="progressBar" id="progressBar"></div></div></div>
        </div>
      </div>
      <div class="right">
        <div class="settings" id="settings">
          <label class="field"><span data-i18n="selectionLabel">중복 후보 선택 방식</span><select id="selectionMode"><option value="algorithm" data-i18n="algorithm">내장 알고리즘</option><option value="ollama" data-i18n="ollama">로컬 LLM · Ollama</option><option value="api" data-i18n="externalApi">외부 AI API</option></select></label>
          <p class="modeHelp" id="modeHelp"></p>
          <div class="configPanel" id="ollamaConfig">
            <div class="modelRow"><label class="field"><span data-i18n="installedModel">설치된 MODEL</span><select id="model"><option value="">—</option></select></label><button class="refresh" id="refreshModels">↻</button></div>
            <label class="field"><span data-i18n="ollamaUrlLabel">OLLAMA URL</span><input id="ollamaUrl" type="text" value="http://127.0.0.1:11434"></label>
          </div>
          <div class="configPanel" id="apiConfig">
            <div class="methodRow"><label class="field"><span data-i18n="httpMethod">HTTP 메서드</span><select id="apiMethod"><option>POST</option><option>PUT</option><option>PATCH</option><option>GET</option><option>DELETE</option></select></label><label class="field"><span data-i18n="chatUrl">채팅 API URL</span><input id="apiUrl" type="text" placeholder="https://api.example.com/v1/chat/completions"></label></div>
            <label class="field"><span data-i18n="headersLabel">헤더 · JSON</span>
              <div class="codeEditor" id="headersEditor"><pre id="headersHighlight"></pre><textarea id="apiHeaders" spellcheck="false" placeholder='{"Authorization":"Bearer ..."}'></textarea></div>
            </label>
            <label class="field"><span data-i18n="bodyLabel">본문 템플릿</span> <span class="templateNote" data-i18n="dataNote">· 요청 위치에 {{data}} 사용</span>
              <div class="codeEditor body" id="bodyEditor"><pre id="bodyHighlight"></pre><textarea id="apiBody" spellcheck="false">{"messages":[{"role":"user","content":"{{data}}"}]}</textarea></div>
            </label>
          </div>
        </div>
        <div class="compareSettings" id="compareSettings">
          <label class="check"><input id="compareOriginal" type="checkbox"><span data-i18n="compareOriginal">원본 파일과 비교하기</span></label>
          <div class="compareDrop" id="compareDrop"><input id="comparePicker" type="file" multiple><strong id="comparePrompt"></strong><span id="compareHint"></span></div>
          <div class="compareResult" id="compareResult"></div>
        </div>
        <div class="result" id="result"><div class="metric"><span data-i18n="original">원본</span><b id="mOriginal">—</b></div><div class="metric"><span data-i18n="result">결과</span><b id="mResult">—</b></div><div class="metric"><span data-i18n="ratio">비율 / 사전</span><b id="mRatio">—</b></div></div>
      </div>
    </div>
  </section>
  <footer data-i18n="footer">파일은 이 컴퓨터의 로컬 AIP 서버에서만 처리됩니다.</footer>
</main>
<script>
const $=id=>document.getElementById(id);
let mode='compress',selected=[],comparisonFiles=[],language='ko',working=false,statusRenderer=null,comparisonSummary=null;
const T={
  ko:{compressTab:'압축하기',decompressTab:'압축풀기',selectionLabel:'중복 후보 선택 방식',algorithm:'내장 알고리즘',ollama:'로컬 LLM · Ollama',externalApi:'외부 AI API',installedModel:'설치된 모델',chatUrl:'채팅 API URL',dataNote:'· 요청 위치에 {{data}} 사용',compareOriginal:'원본 파일과 비교하기',original:'원본',result:'결과',ratio:'비율 / 사전',footer:'파일은 이 컴퓨터의 로컬 AIP 서버에서만 처리됩니다.',dropCompress:'압축할 파일들을 놓아주세요',dropDecompress:'.aip 파일을 놓아주세요',hintCompress:'여러 파일 선택 가능 · 전체 최대 256 MiB',hintDecompress:'한 번에 .aip 파일 하나 · 최대 256 MiB',goCompress:'파일 압축',goDecompress:'압축 해제',ready:'파일을 선택하면 시작할 수 있어요.',compareDrop:'압축 전 원본 파일을 놓아주세요',compareHint:'클릭 또는 드래그 · 여러 파일 가능',modeAlgorithm:'AI 없이 AIP 알고리즘이 예상 절감량으로 후보를 선택합니다.',modeOllama:'로컬 Ollama 모델이 검증된 후보 ID를 선택합니다.',modeApi:'외부 채팅 API가 검증된 후보 ID를 선택합니다.',files:n=>`${n}개 파일`,total:'전체',uploading:p=>`로컬 서버로 업로드 중 · ${p}%`,processing:'업로드 완료 · 중복 후보 분석 중…',comparing:'복원 파일과 원본 SHA-256 비교 중…',building:'파일 번들 생성 중…',networkError:'네트워크 연결에 실패했습니다.',serverError:'요청 처리에 실패했습니다.',invalidBundle:'AIP 파일 번들이 손상되었습니다.',invalidHeaders:'API 헤더가 올바른 JSON 형식이 아닙니다.',modelUnavailable:'Ollama 연결 안 됨',compareMissing:'원본 없음',compareOk:'동일',compareDiff:'불일치',compareExact:(m,n)=>`✓ 원본과 완전히 동일 · SHA-256 · ${m}/${n}`,compareMismatch:(m,n,d)=>`✕ 불일치 · ${m}/${n}개 동일 · ${d}`,algorithmDone:'내장 알고리즘으로 후보 선택 완료',ollamaDone:'로컬 Ollama로 후보 선택 완료',apiDone:'외부 AI API로 후보 선택 완료',fallbackDone:'AI 응답을 사용할 수 없어 내장 알고리즘으로 처리 완료',compressDone:n=>`${n}개 파일 압축 완료`,restoreDone:n=>`${n}개 파일 복원 완료`,errorPrefix:'오류: '},
  en:{compressTab:'Compress',decompressTab:'Decompress',selectionLabel:'Candidate selection',algorithm:'Built-in algorithm',ollama:'Local LLM · Ollama',externalApi:'External AI API',installedModel:'Installed model',chatUrl:'Chat API URL',dataNote:'· place {{data}} where the request belongs',compareOriginal:'Compare with originals',original:'Original',result:'Result',ratio:'Ratio / dictionary',footer:'Files are processed only by the local AIP server on this computer.',dropCompress:'Drop files to compress',dropDecompress:'Drop one .aip file',hintCompress:'Multiple files · 256 MiB total limit',hintDecompress:'One .aip file · 256 MiB limit',goCompress:'Compress files',goDecompress:'Decompress',ready:'Select a file to begin.',compareDrop:'Drop original files here',compareHint:'Click or drag · multiple files supported',modeAlgorithm:'AIP selects candidates by estimated savings without AI.',modeOllama:'A local Ollama model selects validated candidate IDs.',modeApi:'An external chat API selects validated candidate IDs.',files:n=>`${n} files`,total:'Total',uploading:p=>`Uploading to local server · ${p}%`,processing:'Upload complete · analyzing repeated candidates…',comparing:'Comparing restored files with SHA-256…',building:'Building file bundle…',networkError:'Network connection failed.',serverError:'The request could not be processed.',invalidBundle:'The AIP file bundle is invalid.',invalidHeaders:'API headers are not valid JSON.',modelUnavailable:'Ollama unavailable',compareMissing:'missing original',compareOk:'identical',compareDiff:'different',compareExact:(m,n)=>`✓ Identical to originals · SHA-256 · ${m}/${n}`,compareMismatch:(m,n,d)=>`✕ Mismatch · ${m}/${n} identical · ${d}`,algorithmDone:'Candidate selection completed with the built-in algorithm',ollamaDone:'Candidate selection completed with local Ollama',apiDone:'Candidate selection completed with the external AI API',fallbackDone:'AI response was unavailable; completed with the built-in algorithm',compressDone:n=>`${n} file(s) compressed`,restoreDone:n=>`${n} file(s) restored`,errorPrefix:'Error: '}
};
Object.assign(T.ko,{ollamaUrlLabel:'Ollama 주소',httpMethod:'HTTP 메서드',headersLabel:'헤더 · JSON',bodyLabel:'본문 템플릿'});
Object.assign(T.en,{ollamaUrlLabel:'Ollama URL',httpMethod:'HTTP method',headersLabel:'Headers · JSON',bodyLabel:'Body template'});
const tr=key=>T[language][key];
const fmt=n=>n<1024?n+' B':n<1048576?(n/1024).toFixed(1)+' KiB':(n/1048576).toFixed(1)+' MiB';
const total=()=>selected.reduce((sum,file)=>sum+file.size,0);
function applyLanguage(){
  document.documentElement.lang=language;document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=tr(el.dataset.i18n));
  $('langKo').classList.toggle('active',language==='ko');$('langEn').classList.toggle('active',language==='en');
  $('prompt').textContent=tr(mode==='compress'?'dropCompress':'dropDecompress');$('hint').textContent=tr(mode==='compress'?'hintCompress':'hintDecompress');$('go').textContent=tr(mode==='compress'?'goCompress':'goDecompress');
  $('comparePrompt').textContent=comparisonFiles.length?(comparisonFiles.length===1?comparisonFiles[0].name:tr('files')(comparisonFiles.length)):tr('compareDrop');$('compareHint').textContent=comparisonFiles.length?`${tr('total')} ${fmt(comparisonFiles.reduce((s,f)=>s+f.size,0))}`:tr('compareHint');
  updateSelectionMode();renderFiles();if($('model').dataset.state==='unavailable')$('model').innerHTML=`<option value="">${tr('modelUnavailable')}</option>`;if(comparisonSummary)renderComparison();if(statusRenderer)statusRenderer();else if(!selected.length&&!working)setStatus(tr('ready'));updateActionState();
}
function escapeHtml(value){return value.replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
function highlight(source,target,editor){const html=escapeHtml(source.value).replaceAll('{{data}}','<span class="token">{{data}}</span>')+'\n';target.innerHTML=html;target.scrollTop=source.scrollTop;target.scrollLeft=source.scrollLeft;editor.classList.toggle('invalid',$('selectionMode').value==='api'&&!hasDataToken())}
function syncEditors(){highlight($('apiHeaders'),$('headersHighlight'),$('headersEditor'));highlight($('apiBody'),$('bodyHighlight'),$('bodyEditor'));updateActionState()}
function hasDataToken(){return $('apiHeaders').value.includes('{{data}}')||$('apiBody').value.includes('{{data}}')}
function updateActionState(){let enabled=selected.length>0&&!working;if(mode==='compress'&&$('selectionMode').value==='api')enabled=enabled&&!!$('apiUrl').value.trim()&&hasDataToken();if(mode==='decompress'&&$('compareOriginal').checked)enabled=enabled&&comparisonFiles.length>0;$('go').disabled=!enabled}
function renderFiles(){
  $('uploadList').classList.toggle('show',selected.length>0);$('uploadList').innerHTML=selected.map(file=>`<div class="uploadItem"><span>${escapeHtml(file.name)}</span><small>${fmt(file.size)}</small></div>`).join('');
}
function showFiles(files){selected=mode==='compress'?[...files]:[files[0]].filter(Boolean);renderFiles();if(selected.length)setLocalizedStatus(()=>mode==='compress'?`${tr('files')(selected.length)} · ${tr('total')} ${fmt(total())}`:`${selected[0].name} · ${fmt(selected[0].size)}`);else setLocalizedStatus(()=>tr('ready'));updateActionState()}
function setStatus(text,busy=false){statusRenderer=null;$('status').textContent=text;$('status').classList.toggle('busy',busy)}
function setLocalizedStatus(factory,busy=false){statusRenderer=()=>{$('status').textContent=factory();$('status').classList.toggle('busy',busy)};statusRenderer()}
function setProgress(value,indeterminate=false){$('progress').classList.toggle('show',value!==null);$('progress').classList.toggle('indeterminate',indeterminate);if(value!==null&&!indeterminate)$('progressBar').style.width=Math.max(0,Math.min(100,value))+'%'}
function localizedError(error){return tr(error&&error.code?error.code:'serverError')}
function aiStatus(raw){if(!raw)return tr('algorithmDone');if(raw.startsWith('Algorithm-only'))return tr('algorithmDone');if(raw.startsWith('Ollama model'))return tr('ollamaDone');if(raw.startsWith('External AI API'))return tr('apiDone');if(raw.startsWith('AI unavailable'))return tr('fallbackDone');return tr('algorithmDone')}
function codedError(code){const error=new Error(code);error.code=code;return error}
function varint(value){const out=[];while(value>=128){out.push((value&127)|128);value=Math.floor(value/128)}out.push(value);return new Uint8Array(out)}
async function makeBundle(files){const encoder=new TextEncoder(),parts=[encoder.encode('AIPB1'),varint(files.length)];for(const file of files){const name=encoder.encode(file.name);parts.push(varint(name.length),name,varint(file.size),new Uint8Array(await file.arrayBuffer()))}return new Blob(parts)}
function makeCompressionRequest(payload,config){const encoder=new TextEncoder(),json=encoder.encode(JSON.stringify(config));return new Blob([encoder.encode('AIPR1'),varint(json.length),json,payload])}
function readVarint(bytes,state){let value=0,m=1;for(let i=0;i<10;i++){if(state.pos>=bytes.length)throw codedError('invalidBundle');const c=bytes[state.pos++];value+=(c&127)*m;if(!(c&128))return value;m*=128}throw codedError('invalidBundle')}
async function unpackBundle(blob){const bytes=new Uint8Array(await blob.arrayBuffer()),decoder=new TextDecoder(),state={pos:5};if(decoder.decode(bytes.slice(0,5))!=='AIPB1')throw codedError('invalidBundle');const count=readVarint(bytes,state),files=[];for(let i=0;i<count;i++){const n=readVarint(bytes,state),name=decoder.decode(bytes.slice(state.pos,state.pos+n));state.pos+=n;const size=readVarint(bytes,state),data=bytes.slice(state.pos,state.pos+size);state.pos+=size;files.push({name,data})}return files}
function downloadBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1500)}
async function unpackAndDownload(blob){const files=await unpackBundle(blob);files.forEach((file,index)=>setTimeout(()=>downloadBlob(new Blob([file.data]),file.name),index*180));return files}
function renderComparison(){const {exact,matched,total,details}=comparisonSummary;$('compareResult').textContent=exact?tr('compareExact')(matched,total):tr('compareMismatch')(matched,total,details.map(item=>`${item.name}: ${tr(item.state)}`).join(' / '));$('compareResult').className='compareResult show '+(exact?'match':'mismatch')}
async function compareRestored(blob,outputType,name){const restored=outputType==='aip-bundle'?await unpackBundle(blob):[{name,data:new Uint8Array(await blob.arrayBuffer())}],originals=new Map(comparisonFiles.map(file=>[file.name,file]));let matched=0;const details=[];for(const item of restored){const original=originals.get(item.name)||(restored.length===1&&comparisonFiles.length===1?comparisonFiles[0]:null);if(!original){details.push({name:item.name,state:'compareMissing'});continue}const source=await original.arrayBuffer();let same=source.byteLength===item.data.byteLength;if(same){const [a,b]=await Promise.all([crypto.subtle.digest('SHA-256',source),crypto.subtle.digest('SHA-256',item.data)]),x=new Uint8Array(a),y=new Uint8Array(b);same=x.every((v,i)=>v===y[i])}matched+=same?1:0;details.push({name:item.name,state:same?'compareOk':'compareDiff'})}comparisonSummary={exact:restored.length===comparisonFiles.length&&matched===restored.length,matched,total:restored.length,details};renderComparison()}
function xhrBinary(url,body){return new Promise((resolve,reject)=>{const xhr=new XMLHttpRequest();xhr.open('POST',url);xhr.responseType='blob';xhr.setRequestHeader('Content-Type','application/octet-stream');xhr.upload.onprogress=e=>{if(e.lengthComputable){const p=Math.round(e.loaded/e.total*100);setProgress(p);setLocalizedStatus(()=>tr('uploading')(p),true)}};xhr.upload.onload=()=>{setProgress(0,true);setLocalizedStatus(()=>tr('processing'),true)};xhr.onerror=()=>reject(codedError('networkError'));xhr.onload=()=>{const headers={get:name=>xhr.getResponseHeader(name)};if(xhr.status>=200&&xhr.status<300)resolve({blob:xhr.response,headers});else reject(codedError('serverError'))};xhr.send(body)})}
async function loadModels(){const select=$('model');select.dataset.state='loading';select.innerHTML='<option>…</option>';$('refreshModels').disabled=true;try{const response=await fetch('/api/ollama/models?url='+encodeURIComponent($('ollamaUrl').value)),data=await response.json();if(!response.ok)throw codedError('modelUnavailable');select.dataset.state='ready';select.innerHTML=data.models.map(name=>`<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join('')||'<option value="">—</option>'}catch{select.dataset.state='unavailable';select.innerHTML=`<option value="">${tr('modelUnavailable')}</option>`}finally{$('refreshModels').disabled=false}}
function updateSelectionMode(){const value=$('selectionMode').value;$('ollamaConfig').classList.toggle('show',value==='ollama');$('apiConfig').classList.toggle('show',value==='api');$('modeHelp').textContent=tr(value==='algorithm'?'modeAlgorithm':value==='ollama'?'modeOllama':'modeApi');if(value==='ollama'&&!$('model').value)loadModels();syncEditors();updateActionState()}
function switchMode(next){mode=next;selected=[];comparisonFiles=[];comparisonSummary=null;statusRenderer=null;$('picker').value='';$('comparePicker').value='';$('compareOriginal').checked=false;$('compareDrop').classList.remove('show');$('compareResult').className='compareResult';$('settings').style.display=mode==='compress'?'grid':'none';$('compareSettings').classList.toggle('show',mode==='decompress');$('picker').multiple=mode==='compress';document.querySelectorAll('.tab').forEach(tab=>tab.classList.toggle('active',tab.dataset.mode===mode));setProgress(null);$('result').classList.remove('show');applyLanguage()}
document.querySelectorAll('.tab').forEach(tab=>tab.onclick=()=>switchMode(tab.dataset.mode));
$('drop').onclick=e=>{if(e.target.closest('.uploadList'))return;$('picker').click()};$('picker').onchange=e=>showFiles(e.target.files);
for(const event of ['dragenter','dragover'])$('drop').addEventListener(event,e=>{e.preventDefault();$('drop').classList.add('drag')});for(const event of ['dragleave','drop'])$('drop').addEventListener(event,e=>{e.preventDefault();$('drop').classList.remove('drag')});$('drop').ondrop=e=>showFiles(e.dataTransfer.files);
$('compareOriginal').onchange=()=>{comparisonSummary=null;$('compareResult').className='compareResult';$('compareDrop').classList.toggle('show',$('compareOriginal').checked);if(!$('compareOriginal').checked){comparisonFiles=[];$('comparePicker').value=''}applyLanguage()};
$('compareDrop').onclick=()=>$('comparePicker').click();$('comparePicker').onchange=e=>{comparisonSummary=null;$('compareResult').className='compareResult';comparisonFiles=[...e.target.files];applyLanguage()};
for(const event of ['dragenter','dragover'])$('compareDrop').addEventListener(event,e=>{e.preventDefault();e.stopPropagation();$('compareDrop').classList.add('drag')});for(const event of ['dragleave','drop'])$('compareDrop').addEventListener(event,e=>{e.preventDefault();e.stopPropagation();$('compareDrop').classList.remove('drag')});$('compareDrop').ondrop=e=>{comparisonSummary=null;$('compareResult').className='compareResult';comparisonFiles=[...e.dataTransfer.files];applyLanguage()};
for(const id of ['apiHeaders','apiBody']){$(id).addEventListener('input',syncEditors);$(id).addEventListener('scroll',syncEditors)}
$('apiUrl').oninput=updateActionState;$('selectionMode').onchange=updateSelectionMode;$('refreshModels').onclick=loadModels;$('ollamaUrl').onchange=loadModels;$('langKo').onclick=()=>{language='ko';applyLanguage()};$('langEn').onclick=()=>{language='en';applyLanguage()};
$('go').addEventListener('click',()=>{comparisonSummary=null},{capture:true});
$('go').onclick=async()=>{if($('go').disabled)return;working=true;updateActionState();$('result').classList.remove('show');$('compareResult').className='compareResult';setProgress(0);try{let body,url='/api/'+mode;if(mode==='compress'){setLocalizedStatus(()=>tr('building'),true);const bundle=await makeBundle(selected),selection=$('selectionMode').value,config={mode:selection,files:selected.length,model:$('model').value,ollama_url:$('ollamaUrl').value};if(selection==='api'){let headers={};if($('apiHeaders').value.trim()){try{headers=JSON.parse($('apiHeaders').value)}catch{throw codedError('invalidHeaders')}}config.api={method:$('apiMethod').value,url:$('apiUrl').value.trim(),headers,body:$('apiBody').value}}body=makeCompressionRequest(bundle,config)}else body=selected[0];const response=await xhrBinary(url,body),blob=response.blob,outputType=response.headers.get('X-AIP-Output-Type'),downloadName=response.headers.get('X-AIP-Download-Name')||selected[0].name.replace(/\.aip$/i,'')||'restored.bin';setProgress(100);if(mode==='compress'){downloadBlob(blob,(selected.length===1?selected[0].name:'AI-Package-'+selected.length+'-files')+'.aip');const size=+response.headers.get('X-AIP-Compressed-Size'),entries=response.headers.get('X-AIP-Dictionary-Entries'),rawStatus=response.headers.get('X-AIP-AI-Status');$('mOriginal').textContent=fmt(total());$('mResult').textContent=fmt(size);$('mRatio').textContent=(total()?size/total()*100:0).toFixed(1)+'% / '+entries;setLocalizedStatus(()=>`${aiStatus(rawStatus)} · ${tr('compressDone')(selected.length)}`)}else{if($('compareOriginal').checked){setLocalizedStatus(()=>tr('comparing'),true);setProgress(0,true);await compareRestored(blob,outputType,downloadName)}if(outputType==='aip-bundle')await unpackAndDownload(blob);else downloadBlob(blob,downloadName);const count=+(response.headers.get('X-AIP-File-Count')||'1');$('mOriginal').textContent=fmt(selected[0].size);$('mResult').textContent=count>1?tr('files')(count):fmt(blob.size);$('mRatio').textContent='SHA-256 ✓';setLocalizedStatus(()=>tr('restoreDone')(count))}$('result').classList.add('show');setProgress(100)}catch(error){setLocalizedStatus(()=>tr('errorPrefix')+localizedError(error));setProgress(null)}finally{working=false;updateActionState()}};
applyLanguage();syncEditors();switchMode('compress');
</script>
